<!DOCTYPE html>
<html lang="zh-CN" data-v="FIX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程内容 - 金牌AI视频剧</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{-webkit-tap-highlight-color:transparent}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
      background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 35%,#fce4ec 70%,#e0f2fe 100%);background-attachment:fixed;color:#1a1a2e;overflow-x:hidden;line-height:1.5;
      padding-top:88px;min-height:100vh;
    }
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,200,255,0.2);border-radius:2px}

    /* Keyframes */
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(0,200,255,0.3),0 0 25px rgba(0,200,255,0.08)}50%{box-shadow:0 0 18px rgba(0,200,255,0.6),0 0 50px rgba(0,200,255,0.2)}}
    @keyframes pulseUnlocked{0%,100%{box-shadow:0 0 6px rgba(6,182,212,0.2),0 0 18px rgba(6,182,212,0.06),inset 0 0 6px rgba(6,182,212,0.04)}50%{box-shadow:0 0 14px rgba(6,182,212,0.5),0 0 35px rgba(6,182,212,0.15),inset 0 0 14px rgba(6,182,212,0.08)}}
    @keyframes glitch1{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,-1px)}80%{transform:translate(1px,1px)}}
    @keyframes particleBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
    @keyframes scanLine{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    /* Nav */
    .nav-bar{
      position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1000;
      width:calc(100% - 40px);max-width:1100px;
      height:64px;display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;
      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,0.5);
      border-radius:20px;
      box-shadow:0 4px 24px rgba(59,130,246,0.08),0 1px 4px rgba(0,0,0,0.04);
    }
    .nav-bar.scrolled{box-shadow:0 8px 40px rgba(59,130,246,0.12),0 2px 8px rgba(0,0,0,0.06)}
    .nav-brand{
      font-size:19px;font-weight:800;letter-spacing:2px;
      background:linear-gradient(135deg,#2563eb,#06b6d4,#8b5cf6);
      background-size:200% 200%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:gradientShift 4s ease infinite;white-space:nowrap;
    }
    .nav-links{display:flex;gap:8px;align-items:center}
    .nav-links a{
      display:inline-block;padding:10px 18px;border-radius:12px;
      font-size:14px;font-weight:600;color:#64748b;transition:all 0.3s;position:relative;
    }
    .nav-links a::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:1px;background:linear-gradient(90deg,#3b82f6,#06b6d4);transition:width 0.3s}
    .nav-links a:hover{color:#2563eb;background:rgba(59,130,246,0.06)}
    .nav-links a:hover::after{width:60%}
    .nav-links a.active{color:#2563eb;background:rgba(59,130,246,0.1);font-weight:700}
    .nav-links a.active::after{width:80%}
    .nav-toggle{display:none;width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}
    .nav-toggle span{display:block;width:20px;height:2px;border-radius:2px;background:#3b82f6}

    /* Canvas layers */
    #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    #lineCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}

    /* Main content */
    .main-wrap{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:40px 28px 80px}
    .page-header{text-align:center;margin-bottom:60px;animation:fadeInUp 0.6s ease}
    .page-header .badge{
      display:inline-block;padding:5px 18px;border-radius:18px;
      font-size:11px;font-weight:700;letter-spacing:4px;color:#2563eb;
      background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);
      margin-bottom:16px;
    }
    .page-header h1{
      font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:6px;
      background:linear-gradient(135deg,#2563eb,#06b6d4,#8b5cf6);
      background-size:300% 300%;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      animation:gradientShift 4s ease infinite;
      filter:drop-shadow(0 2px 8px rgba(37,99,235,0.2));
    }

    /* Week Nodes Grid */
    .nodes-grid{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:24px 20px;
      align-items:start;
    }
    /* Custom placement for 8 nodes in 6-col grid */
    .node-wrap:nth-child(1){grid-column:3 / 5; margin-top:0}    /* W1 - center top */
    .node-wrap:nth-child(2){grid-column:1 / 3; margin-top:40px}  /* W2 - left */
    .node-wrap:nth-child(3){grid-column:5 / 7; margin-top:40px}  /* W3 - right */
    .node-wrap:nth-child(4){grid-column:2 / 4; margin-top:20px}  /* W4 */
    .node-wrap:nth-child(5){grid-column:4 / 6; margin-top:20px}  /* W5 */
    .node-wrap:nth-child(6){grid-column:1 / 3; margin-top:20px}  /* W6 */
    .node-wrap:nth-child(7){grid-column:5 / 7; margin-top:20px}  /* W7 */
    .node-wrap:nth-child(8){grid-column:3 / 5; margin-top:20px}  /* W8 - center bottom */

    /* Node card */
    .node-card{
      position:relative;display:block;
      background:rgba(255,255,255,0.62);
      backdrop-filter:blur(8px);
      border:1px solid rgba(59,130,246,0.12);
      border-radius:16px;padding:28px 20px;text-align:center;
      cursor:pointer;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
      overflow:visible;
      text-decoration:none;
    }
    .node-card::before{
      content:'';position:absolute;inset:-1px;border-radius:16px;z-index:-1;
      background:linear-gradient(135deg,transparent 40%,rgba(0,200,255,0.4),transparent 60%);
      opacity:0;transition:opacity 0.4s;
    }
    .node-card:hover::before{opacity:1}
    .node-card:hover{
      transform:translateY(-6px) scale(1.03);
      border-color:rgba(59,130,246,0.5);
      box-shadow:0 8px 40px rgba(59,130,246,0.18),0 2px 12px rgba(0,0,0,0.06);
    }
    .node-card:active{transform:scale(0.94);transition:transform 0.1s}

    /* Unlocked glow */
    .node-card.unlocked{
      border-color:rgba(6,182,212,0.35);
      animation:pulseUnlocked 3s ease infinite;
    }
    .node-card.unlocked .node-num{color:#06b6d4;text-shadow:0 0 10px rgba(6,182,212,0.3)}
    .node-card.unlocked .node-status{color:#06b6d4}

    /* Locked */
    .node-card.locked{opacity:0.55;cursor:pointer}
    .node-card.locked:hover{opacity:0.8;transform:translateY(-4px) scale(1.02)}

    /* Node elements */
    .node-num{
      font-size:36px;font-weight:900;letter-spacing:2px;
      background:linear-gradient(135deg,#2563eb,#06b6d4);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:4px;
    }
    .node-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
    .node-topic{font-size:12px;color:#64748b;margin-bottom:12px;line-height:1.5}
    .node-status{
      display:inline-block;padding:3px 14px;border-radius:10px;
      font-size:11px;font-weight:600;letter-spacing:2px;
      border:1px solid;
    }
    .node-status.go{color:#06b6d4;border-color:rgba(6,182,212,0.3);background:rgba(6,182,212,0.04)}
    .node-status.wait{color:#94a3b8;border-color:rgba(148,163,184,0.2);background:rgba(148,163,184,0.03)}

    /* Glitch on hover */
    .node-card .glitch-overlay{
      position:absolute;inset:0;border-radius:16px;pointer-events:none;opacity:0;
      background:linear-gradient(transparent 40%,rgba(0,200,255,0.06) 41%,transparent 42%,transparent 58%,rgba(123,47,255,0.06) 59%,transparent 60%);
      transition:opacity 0.2s;
    }
    .node-card:hover .glitch-overlay{opacity:1;animation:glitch1 0.3s ease infinite}
    .node-card:hover .node-title{animation:glitch1 0.25s ease infinite}

    /* Particle burst container */
    .particle-burst{position:absolute;inset:0;pointer-events:none;z-index:10}

    /* Footer */
    .page-footer{text-align:center;padding:40px 28px;position:relative;z-index:2;border-top:1px solid rgba(59,130,246,0.08);color:#94a3b8;font-size:12px}
    .page-footer .ft-brand{font-size:15px;font-weight:700;background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}

    @media(max-width:768px){
      .nav-links{display:none}
      .nav-links.open{display:flex;flex-direction:column;position:fixed;top:88px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(24px);padding:20px 24px;gap:4px;border-radius:20px;border:1px solid rgba(255,255,255,0.5);box-shadow:0 8px 40px rgba(0,0,0,0.08)}
      .nav-links.open a{padding:14px 18px;font-size:15px}
      .nav-toggle{display:flex}
      .nodes-grid{grid-template-columns:repeat(2,1fr);gap:16px}
      .node-wrap:nth-child(1){grid-column:1/3}
      .node-wrap:nth-child(2){grid-column:1/2;margin-top:0}
      .node-wrap:nth-child(3){grid-column:2/3;margin-top:0}
      .node-wrap:nth-child(4){grid-column:1/2;margin-top:0}
      .node-wrap:nth-child(5){grid-column:2/3;margin-top:0}
      .node-wrap:nth-child(6){grid-column:1/2;margin-top:0}
      .node-wrap:nth-child(7){grid-column:2/3;margin-top:0}
      .node-wrap:nth-child(8){grid-column:1/3;margin-top:0}
      .main-wrap{padding:30px 16px 60px}
      .node-card{padding:22px 16px}
    }
    @media(max-width:480px){
      .nav-bar{padding:0 18px;width:calc(100% - 24px)}
      .page-header h1{letter-spacing:2px}
    }
  </style>

<script>
// ===== Nav bar =====
var t=document.getElementById('navToggle'),l=document.getElementById('navLinks');
t.addEventListener('click',function(){l.classList.toggle('open')});
l.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){l.classList.remove('open')})});
window.addEventListener('scroll',function(){document.getElementById('navBar').classList.toggle('scrolled',window.scrollY>10)});

// ===== Background Canvas: flowing neon lines + particles =====
(function(){
  var c=document.getElementById('bgCanvas'),x=c.getContext('2d'),w,h;
  function rs(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}rs();window.addEventListener('resize',rs);

  var lines=[],particles=[];
  // Create flowing neon lines
  for(var i=0;i<12;i++){
    lines.push({
      x1:Math.random()*w,y1:Math.random()*h,
      x2:Math.random()*w,y2:Math.random()*h,
      vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
      vx2:(Math.random()-0.5)*0.5,vy2:(Math.random()-0.5)*0.5,
      hue:Math.random()<0.5?210:250,alpha:Math.random()*0.18+0.06
    });
  }
  // Background particles
  for(var i=0;i<50;i++){
    particles.push({
      x:Math.random()*w,y:Math.random()*h,r:Math.random()*1.2+0.3,
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
      alpha:Math.random()*0.4+0.1,pulse:Math.random()*Math.PI*2
    });
  }

  function draw(){
    x.clearRect(0,0,w,h);
    // Draw flowing lines
    for(var i=0;i<lines.length;i++){
      var ln=lines[i];
      ln.x1+=ln.vx;ln.y1+=ln.vy;ln.x2+=ln.vx2;ln.y2+=ln.vy2;
      if(ln.x1<0||ln.x1>w)ln.vx*=-1;if(ln.y1<0||ln.y1>h)ln.vy*=-1;
      if(ln.x2<0||ln.x2>w)ln.vx2*=-1;if(ln.y2<0||ln.y2>h)ln.vy2*=-1;
      var grad=x.createLinearGradient(ln.x1,ln.y1,ln.x2,ln.y2);
      grad.addColorStop(0,'hsla('+ln.hue+',80%,60%,0)');
      grad.addColorStop(0.5,'hsla('+ln.hue+',80%,60%,'+ln.alpha+')');
      grad.addColorStop(1,'hsla('+ln.hue+',80%,60%,0)');
      x.strokeStyle=grad;x.lineWidth=1;
      x.beginPath();x.moveTo(ln.x1,ln.y1);x.lineTo(ln.x2,ln.y2);x.stroke();
    }
    // Draw particles
    for(var i=0;i<particles.length;i++){
      var p=particles[i];p.pulse+=0.015;
      var a=p.alpha+Math.sin(p.pulse)*0.08;
      x.fillStyle='rgba(59,130,246,'+a+')';x.beginPath();x.arc(p.x,p.y,p.r,0,Math.PI*2);x.fill();
      p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== Circuit line connections between nodes =====
(function(){
  var cv=document.getElementById('lineCanvas'),ct=cv.getContext('2d');
  function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight}resize();window.addEventListener('resize',resize);

  function drawLines(){
    ct.clearRect(0,0,cv.width,cv.height);
    var nodes=document.querySelectorAll('.node-card');
    var positions=[];
    nodes.forEach(function(n){
      var r=n.getBoundingClientRect();
      positions.push({x:r.left+r.width/2,y:r.top+r.height/2,w:n.dataset.wk});
    });
    // Draw circuit connections between adjacent unlocked nodes
    for(var i=0;i<positions.length;i++){
      for(var j=i+1;j<positions.length;j++){
        var dx=positions[i].x-positions[j].x,dy=positions[i].y-positions[j].y;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<350){
          var iUnlocked=nodes[i].classList.contains('unlocked');
          var jUnlocked=nodes[j].classList.contains('unlocked');
          var alpha=iUnlocked&&jUnlocked?0.18:0.05;
          var hue=iUnlocked&&jUnlocked?'210,90%,50%':'210,60%,60%';
          ct.strokeStyle='hsla('+hue+','+alpha+')';
          ct.lineWidth=iUnlocked&&jUnlocked?1.2:0.5;
          ct.setLineDash([4,8]);
          ct.beginPath();
          // Circuit-style L-shaped path
          var mx=(positions[i].x+positions[j].x)/2;
          ct.moveTo(positions[i].x,positions[i].y);
          ct.lineTo(mx,positions[i].y);
          ct.lineTo(mx,positions[j].y);
          ct.lineTo(positions[j].x,positions[j].y);
          ct.stroke();
          ct.setLineDash([]);
          // Node dot at midpoint
          if(iUnlocked&&jUnlocked){
            ct.fillStyle='rgba(59,130,246,0.7)';
            ct.beginPath();ct.arc(mx,positions[j].y,3,0,Math.PI*2);ct.fill();
          }
        }
      }
    }
    requestAnimationFrame(drawLines);
  }
  drawLines();
  window.addEventListener('scroll',drawLines);
})();

// ===== Particle burst on hover =====
document.querySelectorAll('.node-card').forEach(function(card){
  card.addEventListener('mouseenter',function(e){
    var burst=card.querySelector('.particle-burst');
    if(!burst)return;
    burst.innerHTML='';
    var rect=card.getBoundingClientRect();
    var cx=rect.width/2,cy=rect.height/2;
    for(var i=0;i<14;i++){
      var dot=document.createElement('div');
      var angle=(Math.PI*2*i)/14;
      var dist=30+Math.random()*50;
      dot.style.cssText='position:absolute;width:3px;height:3px;border-radius:50%;'+
        'background:hsl('+(210+Math.random()*30)+',70%,'+(40+Math.random()*30)+'%);'+
        'left:'+cx+'px;top:'+cy+'px;'+
        '--dx:'+(Math.cos(angle)*dist)+'px;--dy:'+(Math.sin(angle)*dist)+'px;'+
        'animation:particleBurst 0.6s ease forwards';
      burst.appendChild(dot);
    }
  });
  card.addEventListener('mouseleave',function(){
    var burst=card.querySelector('.particle-burst');
    if(burst)burst.innerHTML='';
  });
  // Click pulse
  card.addEventListener('click',function(e){
    card.style.transform='scale(0.92)';
    card.style.boxShadow='0 0 40px rgba(59,130,246,0.4), 0 0 80px rgba(6,182,212,0.2)';
    setTimeout(function(){
      card.style.transform='';card.style.boxShadow='';
    },200);
  });
});
