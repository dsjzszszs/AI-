<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>适合人群 - 金牌AI视频剧</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 35%,#fce4ec 70%,#e0f2fe 100%);background-attachment:fixed;color:#1a1a2e;overflow-x:hidden;line-height:1.6;padding-top:88px;min-height:100vh}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.2);border-radius:3px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes float2{0%,100%{transform:translateY(-2px)}50%{transform:translateY(3px)}}
@keyframes float3{0%,100%{transform:translateY(1px)}50%{transform:translateY(-5px)}}
@keyframes float4{0%,100%{transform:translateY(-3px)}50%{transform:translateY(2px)}}
@keyframes float5{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes float6{0%,100%{transform:translateY(2px)}50%{transform:translateY(-3px)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.nav-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1000;width:calc(100% - 40px);max-width:1100px;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,0.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.5);border-radius:20px;box-shadow:0 4px 24px rgba(59,130,246,0.08),0 1px 4px rgba(0,0,0,0.04)}.nav-bar.scrolled{box-shadow:0 8px 40px rgba(59,130,246,0.12),0 2px 8px rgba(0,0,0,0.06)}.nav-brand{font-size:18px;font-weight:800;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#2563eb,#06b6d4,#8b5cf6);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;white-space:nowrap}.nav-links{display:flex;gap:8px;align-items:center}.nav-links a{display:inline-block;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;color:#64748b;transition:all 0.3s;white-space:nowrap;position:relative}.nav-links a::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:1px;background:linear-gradient(90deg,#3b82f6,#06b6d4);transition:width 0.3s}.nav-links a:hover{color:#2563eb;background:rgba(59,130,246,0.06)}.nav-links a:hover::after{width:60%}.nav-links a.active{color:#2563eb;background:rgba(59,130,246,0.1);font-weight:700}.nav-links a.active::after{width:80%}.nav-toggle{display:none;width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}.nav-toggle span{display:block;width:20px;height:2px;border-radius:2px;background:#3b82f6}

/* Page */
.page-section{max-width:1100px;margin:0 auto;padding:72px 32px 80px}.page-header{text-align:center;margin-bottom:64px}.page-header h1{font-size:clamp(28px,5vw,42px);font-weight:900;background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}.page-header .subtitle{color:#64748b;font-size:15px}

/* Character Row */
.characters{display:flex;justify-content:center;gap:0;flex-wrap:wrap}
.character{
  flex:1;min-width:0;max-width:180px;text-align:center;padding:0 10px;
  opacity:0;transform:translateY(20px);transition:opacity 0.5s ease,transform 0.5s ease;
  cursor:default;position:relative;
}
.character.visible{opacity:1;transform:translateY(0)}
.character:nth-child(1){animation:float1 5s ease-in-out infinite}
.character:nth-child(2){animation:float2 5.5s ease-in-out infinite}
.character:nth-child(3){animation:float3 4.8s ease-in-out infinite}
.character:nth-child(4){animation:float4 5.2s ease-in-out infinite}
.character:nth-child(5){animation:float5 4.5s ease-in-out infinite}
.character:nth-child(6){animation:float6 5.8s ease-in-out infinite}

/* Hover effects */
.character .ch-inner{transition:transform 0.3s ease}
.character:hover .ch-inner{transform:translateY(-6px)}
.character:hover .ch-avatar-wrap{box-shadow:0 0 0 8px rgba(59,130,246,0.12),0 0 24px rgba(6,182,212,0.18)}
.character:hover .ch-avatar-wrap img{transform:scale(1.05)}
.character:hover .ch-badge{transform:scale(1.08)}
.character:hover .ch-name{background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.character:hover .ch-desc{color:#475569}

/* Badge */
.ch-badge-wrap{display:flex;justify-content:center;margin-bottom:-16px;position:relative;z-index:2}
.ch-badge{
  width:28px;height:28px;border-radius:50%;
  background:#fff;border:2px solid rgba(59,130,246,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#3b82f6;letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(59,130,246,0.08);
  transition:transform 0.3s ease;
}

/* Avatar */
.ch-avatar-wrap{
  width:110px;height:110px;border-radius:50%;margin:0 auto 20px;
  background:linear-gradient(135deg,rgba(59,130,246,0.06),rgba(6,182,212,0.04));
  border:2px solid rgba(59,130,246,0.08);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;transition:box-shadow 0.3s ease;
  position:relative;z-index:1;
}
.ch-avatar-wrap img{
  width:100%;height:100%;object-fit:cover;border-radius:50%;
  transition:transform 0.3s ease;
}
.ch-avatar-placeholder{
  width:60%;height:60%;display:flex;align-items:center;justify-content:center;
}
.ch-avatar-placeholder img{width:100%;height:100%;opacity:0.35}

/* Name */
.ch-name{
  font-size:18px;font-weight:800;color:#1e293b;margin-bottom:8px;
  transition:all 0.3s ease;
}

/* Desc */
.ch-desc{
  font-size:13px;color:#94a3b8;line-height:1.7;max-width:150px;margin:0 auto;
  text-align:center;transition:color 0.3s ease;
}

@media(max-width:900px){
  .characters{display:grid;grid-template-columns:repeat(3,1fr);gap:32px 12px;max-width:600px;margin:0 auto}
  .character{max-width:100%}
}
@media(max-width:600px){
  .characters{grid-template-columns:repeat(2,1fr);gap:28px 10px}
  .ch-avatar-wrap{width:96px;height:96px}
}
@media(max-width:400px){

  .ch-avatar-wrap{width:100px;height:100px}.character{max-width:220px;margin:0 auto}
}
@media(max-width:768px){
  .nav-links{display:none}.nav-links.open{display:flex;flex-direction:column;position:fixed;top:88px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(24px);padding:20px 24px;gap:4px;border-radius:20px;border:1px solid rgba(255,255,255,0.5);box-shadow:0 8px 40px rgba(0,0,0,0.08)}.nav-links.open a{padding:14px 18px;font-size:15px}.nav-toggle{display:flex}
}
@media(max-width:480px){.nav-bar{padding:0 18px;width:calc(100% - 24px)}.page-section{padding:48px 16px 60px}}
</style>
<style>
/* ===== Global Image/Video Viewer（叉按钮固定视口右上角，永远够得到） ===== */
.gv-overlay{position:fixed;inset:0;z-index:99990;display:none;align-items:center;justify-content:center;background:rgba(8,15,30,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:0}

.gv-video{max-width:94vw;max-height:84vh;width:auto;height:auto;background:#000;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);outline:none}

.gv-close{position:fixed;top:16px;right:16px;z-index:99999;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.96);border:none;color:#0f172a;font-size:26px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .2s,background .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.gv-close:hover{transform:scale(1.08);background:#fff}
.gv-close:active{transform:scale(.9)}
@media(max-width:480px){.gv-close{top:10px;right:10px;width:42px;height:42px;font-size:24px}.gv-img,.gv-video{max-width:96vw;max-height:80vh}}

<script>

t.addEventListener('click',function(){l.classList.toggle('open')});

<!-- 全局图片/视频查看器 -->
<div class="gv-overlay" id="gvOverlay" aria-hidden="true">
  <button class="gv-close" id="gvClose" aria-label="关闭">&times;</button>
  <div class="gv-stage">
    <img class="gv-img" id="gvImg" alt="" style="display:none">
    <video class="gv-video" id="gvVideo" controls playsinline style="display:none"></video>
    <div class="gv-caption" id="gvCaption"></div>
  </div>
</div>
<script>
(function(){
  var overlay=document.getElementById('gvOverlay');
  if(!overlay)return;
  var imgEl=document.getElementById('gvImg');
  var videoEl=document.getElementById('gvVideo');
  var capEl=document.getElementById('gvCaption');
  var closeBtn=document.getElementById('gvClose');
  function openViewer(type,src,caption){
    if(type==='video'){
      imgEl.style.display='none';imgEl.removeAttribute('src');
      videoEl.style.display='block';videoEl.src=src;
      videoEl.play().catch(function(){});
    }else{
      videoEl.style.display='none';videoEl.pause();videoEl.removeAttribute('src');
      imgEl.style.display='block';imgEl.src=src;
    }
    capEl.textContent=caption||'';
    overlay.classList.add('open');overlay.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  }
  function closeViewer(){
    overlay.classList.remove('open');overlay.setAttribute('aria-hidden','true');
    document.body.style.overflow='';
    imgEl.src='';imgEl.style.display='none';
    videoEl.pause();videoEl.removeAttribute('src');videoEl.style.display='none';
  }
  closeBtn.addEventListener('click',function(e){e.stopPropagation();closeViewer();});
  overlay.addEventListener('click',function(e){if(e.target===overlay||e.target===capEl)closeViewer();});
  imgEl.addEventListener('click',function(e){e.stopPropagation();});
  videoEl.addEventListener('click',function(e){e.stopPropagation();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&overlay.classList.contains('open'))closeViewer();});
  window.__gvOpen=openViewer;window.__gvClose=closeViewer;
  var skipSel='a, .nav-bar, .nav-links, .nav-toggle, .fcard-icon, .ch-avatar-placeholder, .lecture-icon, .gp-icon, .tl-go, .faq-avatar, [data-no-gv]';
  document.querySelectorAll('img').forEach(function(img){
    if(img.closest(skipSel))return;
    img.style.cursor='pointer';
    img.addEventListener('click',function(e){
      e.stopPropagation();
      var src=img.getAttribute('data-gv-src')||img.currentSrc||img.src;
      var cap=img.getAttribute('data-gv-cap')||img.alt||'';
      openViewer('image',src,cap);
    });
  });
})();
</script>
