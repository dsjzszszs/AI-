<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 35%,#fce4ec 70%,#e0f2fe 100%);background-attachment:fixed;color:#1a1a2e;overflow-x:hidden;line-height:1.6;padding-top:76px;min-height:100vh}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.2);border-radius:3px}@keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}.nav-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:1000;width:calc(100% - 40px);max-width:1100px;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(255,255,255,0.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.5);border-radius:20px;box-shadow:0 4px 24px rgba(59,130,246,0.08),0 1px 4px rgba(0,0,0,0.04)}.nav-bar.scrolled{box-shadow:0 8px 40px rgba(59,130,246,0.12),0 2px 8px rgba(0,0,0,0.06)}.nav-brand{font-size:18px;font-weight:800;letter-spacing:1.5px;display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#2563eb,#06b6d4,#8b5cf6);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;white-space:nowrap}.nav-links{display:flex;gap:8px;align-items:center}.nav-links a{display:inline-block;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;color:#64748b;transition:all 0.3s;white-space:nowrap;position:relative}.nav-links a::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:1px;background:linear-gradient(90deg,#3b82f6,#06b6d4);transition:width 0.3s}.nav-links a:hover{color:#2563eb;background:rgba(59,130,246,0.06)}.nav-links a:hover::after{width:60%}.nav-links a.active{color:#2563eb;background:rgba(59,130,246,0.1);font-weight:700}.nav-links a.active::after{width:80%}.nav-toggle{display:none;width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}.nav-toggle span{display:block;width:20px;height:2px;border-radius:2px;background:#3b82f6}.page-section{max-width:1100px;margin:0 auto;padding:40px 28px 80px;animation:fadeInUp 0.6s ease}.page-section h1{font-size:clamp(28px,5vw,42px);font-weight:900;background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}.page-section .subtitle{color:#64748b;font-size:15px;margin-bottom:12px}

/* Dots */
.carousel-dots{display:flex;justify-content:center;gap:10px;margin-top:24px}

<script>
(function(){
  var container = document.getElementById('carouselContainer');
  var track = document.getElementById('carouselTrack');
  var cards = track.querySelectorAll('.case-card');
  var dotsContainer = document.getElementById('carouselDots');
  var navPrev = document.getElementById('navPrev');
  var navNext = document.getElementById('navNext');

  var cardCount = cards.length;
  var currentIndex = 0;
  var isDragging = false;
  var startX = 0;
  var currentTranslate = 0;
  var prevTranslate = 0;
  var animationID = 0;
  var autoScrollTimer = null;
  var autoScrollDelay = 3000;
  var gap = 24;

  // Create dots
  for(var i=0;i<cardCount;i++){
    var dot = document.createElement('div');
    dot.className = 'dot' + (i===0?' active':'');
    dot.setAttribute('data-index',i);
    dotsContainer.appendChild(dot);
  }
  var dots = dotsContainer.querySelectorAll('.dot');

  function getCardWidth(){
    return cards[0].offsetWidth + gap;
  }

  function getCenterOffset(){
    return container.offsetWidth / 2 - cards[0].offsetWidth / 2;
  }

  // Update card states based on currentIndex - RELIABLE, no coordinate bugs
  function updateCardStates(){
    cards.forEach(function(card, idx){
      card.classList.remove('is-center','is-near');
      var diff = Math.abs(idx - currentIndex);
      if(diff === 0){
        card.classList.add('is-center');
      }else if(diff === 1){
        card.classList.add('is-near');
      }
    });
  }

  function setSliderPosition(animate){
    if(animate !== false){
      track.style.transition = 'transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94)';
    }
    currentTranslate = getCenterOffset() - currentIndex * getCardWidth();
    track.style.transform = 'translateX(' + currentTranslate + 'px)';
    updateCardStates();
    updateDots();
    updateNavButtons();
  }

  function updateDots(){
    dots.forEach(function(d){d.classList.remove('active');});
    if(dots[currentIndex]) dots[currentIndex].classList.add('active');
  }

  function updateNavButtons(){
    navPrev.classList.toggle('disabled', currentIndex <= 0);
    navNext.classList.toggle('disabled', currentIndex >= cardCount - 1);
  }

  function goToSlide(index, animate){
    if(index < 0) index = 0;
    if(index >= cardCount) index = cardCount - 1;
    currentIndex = index;
    setSliderPosition(animate);
  }

  function nextSlide(){
    if(currentIndex < cardCount - 1){
      goToSlide(currentIndex + 1);
    }else{
      goToSlide(0);
    }
  }

  function prevSlide(){
    if(currentIndex > 0){
      goToSlide(currentIndex - 1);
    }
  }

  function startAutoScroll(){
    stopAutoScroll();
    autoScrollTimer = setInterval(nextSlide, autoScrollDelay);
  }

  function stopAutoScroll(){
    if(autoScrollTimer){
      clearInterval(autoScrollTimer);
      autoScrollTimer = null;
    }
  }

  // ===== Touch events (mobile) =====
  track.addEventListener('touchstart', function(e){
    isDragging = true;
    startX = e.touches[0].clientX;
    prevTranslate = currentTranslate;
    track.classList.add('is-dragging');
    track.style.transition = 'none';
    stopAutoScroll();
    animationID = requestAnimationFrame(animation);
  }, {passive:true});

  track.addEventListener('touchend', function(){
    if(!isDragging) return;
    isDragging = false;
    track.classList.remove('is-dragging');
    cancelAnimationFrame(animationID);
    var movedBy = currentTranslate - prevTranslate;
    if(Math.abs(movedBy) > 40){
      if(movedBy < 0 && currentIndex < cardCount - 1){
        currentIndex++;
      }else if(movedBy > 0 && currentIndex > 0){
        currentIndex--;
      }
    }
    goToSlide(currentIndex);
    startAutoScroll();
  }, {passive:true});

  track.addEventListener('touchmove', function(e){
    if(!isDragging) return;
    var currentX = e.touches[0].clientX;
    currentTranslate = prevTranslate + (currentX - startX);
  }, {passive:true});

  // ===== Mouse events (desktop) =====
  track.addEventListener('mousedown', function(e){
    isDragging = true;
    startX = e.clientX;
    prevTranslate = currentTranslate;
    track.classList.add('is-dragging');
    track.style.transition = 'none';
    stopAutoScroll();
    animationID = requestAnimationFrame(animation);
  });

  track.addEventListener('mouseup', function(){
    if(!isDragging) return;
    isDragging = false;
    track.classList.remove('is-dragging');
    cancelAnimationFrame(animationID);
    var movedBy = currentTranslate - prevTranslate;
    if(Math.abs(movedBy) > 40){
      if(movedBy < 0 && currentIndex < cardCount - 1){
        currentIndex++;
      }else if(movedBy > 0 && currentIndex > 0){
        currentIndex--;
      }
    }
    goToSlide(currentIndex);
    startAutoScroll();
  });

  track.addEventListener('mouseleave', function(){
    if(isDragging){
      isDragging = false;
      track.classList.remove('is-dragging');
      cancelAnimationFrame(animationID);
      goToSlide(currentIndex);
      startAutoScroll();
    }
  });

  track.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    var currentX = e.clientX;
    currentTranslate = prevTranslate + (currentX - startX);
  });

  function animation(){
    track.style.transform = 'translateX(' + currentTranslate + 'px)';
    if(isDragging) animationID = requestAnimationFrame(animation);
  }

  // ===== Navigation buttons =====
  navPrev.addEventListener('click', function(){
    if(currentIndex > 0){
      stopAutoScroll();
      prevSlide();
      startAutoScroll();
    }
  });

  navNext.addEventListener('click', function(){
    stopAutoScroll();
    nextSlide();
    startAutoScroll();
  });

  // ===== Click on dots =====
  dots.forEach(function(dot){
    dot.addEventListener('click', function(){
      var idx = parseInt(this.getAttribute('data-index'));
      stopAutoScroll();
      goToSlide(idx);
      startAutoScroll();
    });
  });

  // ===== Pause on hover =====
  container.addEventListener('mouseenter', stopAutoScroll);
  container.addEventListener('mouseleave', startAutoScroll);

  // ===== Handle resize =====
  var resizeTimer;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      goToSlide(currentIndex, false);
    }, 100);
  });

  // ===== Initialize =====
  goToSlide(0, false);
  startAutoScroll();
})();
</script>

<script>
(function(){
  var modal = document.getElementById('videoModal');
  var video = document.getElementById('vmVideo');
  var caption = document.getElementById('vmCaption');
  var closeBtn = document.getElementById('vmClose');
  var backdrop = document.getElementById('vmBackdrop');

  function openModal(src, title){
    video.src = src;
    caption.textContent = title || '';
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
    video.play().catch(function(){});
  }
  function closeModal(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
    video.pause();
    video.removeAttribute('src');
    video.load();
  }

  document.querySelectorAll('.case-card').forEach(function(card){
    card.addEventListener('click', function(){
      var src = card.getAttribute('data-video');
      var title = card.getAttribute('data-title') || card.querySelector('h3').textContent;
      openModal(src, title);
    });
  });

  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', closeModal);
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });
})();
</script>
