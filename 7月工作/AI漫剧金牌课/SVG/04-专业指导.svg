<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="windowFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="windowBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0ff"/>
    </linearGradient>
    <linearGradient id="headerBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="checkBadge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pencilBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pencilWood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="baseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.18"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="particleGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>


  <!-- ground glow -->
  <ellipse cx="230" cy="430" rx="160" ry="18" fill="url(#baseGlow)"/>

  <!-- particles -->
  <g filter="url(#particleGlow)">
    <circle cx="60" cy="110" r="2.5" fill="#a855f7" opacity="0.4"/>
    <circle cx="440" cy="80" r="2" fill="#818cf8" opacity="0.45"/>
    <circle cx="460" cy="330" r="3" fill="#7c3aed" opacity="0.3"/>
    <circle cx="70" cy="380" r="2" fill="#6366f1" opacity="0.4"/>
    <circle cx="390" cy="50" r="1.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="100" cy="60" r="2" fill="#818cf8" opacity="0.35"/>
    <circle cx="430" cy="200" r="1.5" fill="#a78bfa" opacity="0.4"/>
  </g>

  <!-- ===== CHAT WINDOW ===== -->
  <g filter="url(#softShadow)">
    <!-- window frame -->
    <rect x="110" y="140" width="240" height="200" rx="16" fill="url(#windowFrame)"/>
    <!-- window body -->
    <rect x="118" y="168" width="224" height="164" rx="8" fill="url(#windowBody)"/>

    <!-- header bar -->
    <rect x="118" y="168" width="224" height="32" rx="8" fill="url(#headerBar)"/>
    <rect x="118" y="192" width="224" height="8" fill="url(#headerBar)"/>

    <!-- header dots -->
    <circle cx="135" cy="184" r="5" fill="#ffffff" opacity="0.5"/>
    <circle cx="152" cy="184" r="5" fill="#ffffff" opacity="0.4"/>
    <circle cx="169" cy="184" r="5" fill="#ffffff" opacity="0.3"/>

    <!-- message row 1 (incoming) -->
    <rect x="132" y="215" width="120" height="10" rx="5" fill="#e0e0ff"/>
    <rect x="132" y="231" width="90" height="8" rx="4" fill="#e0e0ff" opacity="0.7"/>

    <!-- checkmark badge -->
    <g transform="translate(150, 275)">
      <circle cx="0" cy="0" r="24" fill="url(#checkBadge)" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="24" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
      <path d="M -10,0 L -3,8 L 11,-8" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- pencil icon -->
    <g transform="translate(210, 285) rotate(-35)">
      <!-- eraser -->
      <rect x="-2" y="-30" width="12" height="8" rx="2" fill="#f472b6"/>
      <!-- ferrule -->
      <rect x="-2" y="-22" width="12" height="5" fill="#c0c0c0"/>
      <!-- pencil body -->
      <rect x="-2" y="-17" width="12" height="35" fill="url(#pencilBody)"/>
      <!-- wood tip -->
      <polygon points="-2,18 10,18 6,30 2,30" fill="url(#pencilWood)"/>
      <!-- graphite tip -->
      <polygon points="2,30 6,30 4,35" fill="#4b5563"/>
      <!-- highlight stripe -->
      <rect x="1" y="-15" width="2" height="30" fill="#ffffff" opacity="0.3"/>
    </g>

    <!-- text lines (abstract) -->
    <rect x="250" y="265" width="75" height="7" rx="3.5" fill="#e0e0ff"/>
    <rect x="250" y="278" width="55" height="7" rx="3.5" fill="#e0e0ff" opacity="0.7"/>
    <rect x="250" y="291" width="65" height="7" rx="3.5" fill="#e0e0ff" opacity="0.5"/>

    <!-- input bar -->
    <rect x="130" y="310" width="180" height="14" rx="7" fill="#f0f0ff"/>
    <circle cx="305" cy="317" r="10" fill="url(#bubbleGrad)" filter="url(#glow)"/>
    <path d="M 301,314 L 301,320 L 306,320 L 306,324 L 311,320 L 311,314 Z" fill="#ffffff"/>
  </g>

  <!-- ===== FLOATING CHAT BUBBLE ===== -->
  <g filter="url(#softShadow)" transform="translate(390, 200)">
    <!-- bubble -->
    <path d="M -45,-35 Q -50,-35 -50,-28 L -50,18 Q -50,25 -43,25 L -12,25 L -8,34 L -4,25 L 43,25 Q 50,25 50,18 L 50,-28 Q 50,-35 43,-35 Z" fill="url(#bubbleGrad)" filter="url(#glow)"/>
    <!-- dots inside bubble -->
    <circle cx="-20" cy="-5" r="5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-5" r="5" fill="#ffffff" opacity="0.7"/>
    <circle cx="20" cy="-5" r="5" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- small floating bubble -->
  <g filter="url(#softShadow)" transform="translate(80, 220)" opacity="0.7">
    <path d="M -22,-18 Q -25,-18 -25,-14 L -25,8 Q -25,12 -21,12 L -6,12 L -3,17 L 0,12 L 21,12 Q 25,12 25,8 L 25,-14 Q 25,-18 21,-18 Z" fill="url(#bubbleGrad)"/>
    <circle cx="-8" cy="-3" r="3" fill="#ffffff" opacity="0.8"/>
    <circle cx="0" cy="-3" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="8" cy="-3" r="3" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>