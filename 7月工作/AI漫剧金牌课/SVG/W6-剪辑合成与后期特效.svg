<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="puzzle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="puzzle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="puzzle3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="puzzle4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="playerScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/><stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="sparkleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="baseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.18"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <ellipse cx="250" cy="445" rx="180" ry="18" fill="url(#baseGlow)"/>

  <g filter="url(#pGlow)">
    <circle cx="55" cy="110" r="2.5" fill="#a855f7" opacity="0.4"/>
    <circle cx="445" cy="100" r="2" fill="#818cf8" opacity="0.45"/>
    <circle cx="460" cy="350" r="3" fill="#7c3aed" opacity="0.3"/>
    <circle cx="40" cy="340" r="2.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="410" cy="60" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="85" cy="420" r="1.5" fill="#818cf8" opacity="0.35"/>
    <circle cx="440" cy="240" r="1.5" fill="#a78bfa" opacity="0.4"/>
  </g>

  <!-- ===== ASSEMBLED PLAYER (center-right) ===== -->
  <g filter="url(#softShadow)">
    <rect x="250" y="130" width="130" height="180" rx="10" fill="url(#puzzle1)"/>
    <rect x="260" y="148" width="110" height="110" rx="5" fill="url(#playerScreen)"/>
    <!-- content -->
    <rect x="270" y="158" width="50" height="38" rx="3" fill="#312e81"/>
    <polygon points="288,167 288,187 302,177" fill="#a5b4fc" opacity="0.7"/>
    <rect x="326" y="158" width="38" height="38" rx="3" fill="#312e81"/>
    <g opacity="0.5">
      <rect x="332" y="165" width="26" height="3" rx="1.5" fill="#818cf8"/>
      <rect x="332" y="173" width="18" height="3" rx="1.5" fill="#6366f1"/>
      <rect x="332" y="181" width="24" height="3" rx="1.5" fill="#6366f1"/>
    </g>
    <!-- progress -->
    <rect x="270" y="230" width="90" height="4" rx="2" fill="#312e81"/>
    <rect x="270" y="230" width="40" height="4" rx="2" fill="#c084fc"/>
    <circle cx="310" cy="232" r="4" fill="#ffffff" filter="url(#glow)"/>
    <!-- controls -->
    <rect x="278" y="255" width="14" height="4" rx="2" fill="#4c1d95"/>
    <rect x="296" y="255" width="12" height="4" rx="2" fill="#4c1d95"/>
    <rect x="312" y="255" width="16" height="4" rx="2" fill="#4c1d95"/>
  </g>

  <!-- ===== PUZZLE PIECES (left side, assembling toward center) ===== -->

  <!-- Piece 1 (close to player) -->
  <g filter="url(#softShadow)" transform="translate(180, 155) rotate(-4)">
    <rect x="0" y="0" width="60" height="50" rx="3" fill="url(#puzzle2)"/>
    <path d="M 60,15 Q 67,15 67,22 Q 67,29 60,29" fill="url(#puzzle2)"/>
    <rect x="5" y="7" width="48" height="33" rx="2" fill="url(#playerScreen)" opacity="0.7"/>
    <polygon points="25,16 25,30 35,23" fill="#a5b4fc" opacity="0.5"/>
  </g>

  <!-- Piece 2 -->
  <g filter="url(#softShadow)" transform="translate(140, 200) rotate(6)">
    <rect x="0" y="0" width="65" height="50" rx="3" fill="url(#puzzle3)"/>
    <path d="M 22,0 Q 22,-7 30,-7 Q 38,-7 38,0" fill="url(#puzzle3)"/>
    <path d="M 65,16 Q 72,16 72,24 Q 72,32 65,32" fill="url(#puzzle3)"/>
    <rect x="5" y="7" width="53" height="32" rx="2" fill="url(#playerScreen)" opacity="0.6"/>
    <g opacity="0.4">
      <rect x="11" y="13" width="28" height="2.5" rx="1.25" fill="#818cf8"/>
      <rect x="11" y="20" width="18" height="2.5" rx="1.25" fill="#6366f1"/>
    </g>
  </g>

  <!-- Piece 3 -->
  <g filter="url(#softShadow)" transform="translate(115, 255) rotate(-7)">
    <rect x="0" y="0" width="68" height="52" rx="3" fill="url(#puzzle4)"/>
    <path d="M 25,52 Q 25,60 33,60 Q 41,60 41,52" fill="url(#puzzle4)"/>
    <path d="M 68,18 Q 75,18 75,26 Q 75,34 68,34" fill="url(#puzzle4)"/>
    <rect x="5" y="7" width="55" height="34" rx="2" fill="url(#playerScreen)" opacity="0.5"/>
    <g opacity="0.35">
      <rect x="11" y="13" width="32" height="2.5" rx="1.25" fill="#818cf8"/>
      <rect x="11" y="20" width="20" height="2.5" rx="1.25" fill="#6366f1"/>
    </g>
  </g>

  <!-- Piece 4 (small) -->
  <g filter="url(#softShadow)" transform="translate(200, 275) rotate(2)">
    <rect x="0" y="0" width="50" height="45" rx="3" fill="url(#puzzle1)"/>
    <path d="M 0,14 Q -6,14 -6,22 Q -6,30 0,30" fill="url(#puzzle1)"/>
    <rect x="7" y="7" width="38" height="28" rx="2" fill="url(#playerScreen)" opacity="0.7"/>
    <rect x="13" y="13" width="22" height="2.5" rx="1.25" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- assembly trails -->
  <g stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="4,3">
    <path d="M 195,180 Q 215,172 250,172"/>
    <path d="M 165,225 Q 205,218 250,212"/>
    <path d="M 145,280 Q 195,265 250,255"/>
    <path d="M 210,300 Q 230,295 250,290"/>
  </g>

  <!-- ===== SPARKLE ===== -->
  <g filter="url(#glow)" transform="translate(350, 315)">
    <polygon points="0,-24 8,-8 24,-8 11,3 16,22 0,12 -16,22 -11,3 -24,-8 -8,-8" fill="url(#sparkleGrad)"/>
    <polygon points="0,-15 5,-4 14,-4 7,2 10,14 0,7 -10,14 -7,2 -14,-4 -5,-4" fill="#fde68a" opacity="0.45"/>
  </g>

  <!-- particles -->
  <g filter="url(#pGlow)">
    <circle cx="365" cy="295" r="2" fill="#fbbf24" opacity="0.5"/>
    <circle cx="380" cy="335" r="1.5" fill="#fde68a" opacity="0.4"/>
    <circle cx="335" cy="335" r="1.5" fill="#f59e0b" opacity="0.4"/>
    <polygon points="358,290 360,293 358,296 356,293" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>