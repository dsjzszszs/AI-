<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="innerFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="needleLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="needleDark" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="outerGlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="needleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.2"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <linearGradient id="baseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="ringGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ground projection -->
  <ellipse cx="250" cy="435" rx="180" ry="18" fill="url(#baseGlow)"/>

  <!-- outer ambient glow -->
  <circle cx="250" cy="245" r="160" fill="url(#centerGlow)" filter="url(#glow)"/>

  <!-- particles - outer -->
  <g filter="url(#pGlow)">
    <circle cx="70" cy="120" r="2.5" fill="#a855f7" opacity="0.45"/>
    <circle cx="430" cy="110" r="2" fill="#818cf8" opacity="0.5"/>
    <circle cx="455" cy="320" r="3" fill="#7c3aed" opacity="0.35"/>
    <circle cx="50" cy="310" r="2" fill="#6366f1" opacity="0.4"/>
    <circle cx="400" cy="60" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="90" cy="390" r="2" fill="#818cf8" opacity="0.3"/>
    <circle cx="430" cy="200" r="1.5" fill="#a78bfa" opacity="0.4"/>
    <circle cx="60" cy="200" r="2" fill="#c084fc" opacity="0.35"/>
    <circle cx="410" cy="390" r="2.5" fill="#8b5cf6" opacity="0.3"/>
  </g>

  <!-- data nodes (scattered) -->
  <g filter="url(#pGlow)" opacity="0.3">
    <rect x="380" y="150" width="5" height="5" rx="1" fill="#818cf8" transform="rotate(30, 382, 152)"/>
    <rect x="105" y="330" width="5" height="5" rx="1" fill="#a78bfa" transform="rotate(45, 107, 332)"/>
    <rect x="395" y="340" width="5" height="5" rx="1" fill="#c084fc" transform="rotate(15, 397, 342)"/>
    <rect x="95" y="145" width="5" height="5" rx="1" fill="#818cf8" transform="rotate(60, 97, 147)"/>
  </g>

  <!-- ===== COMPASS ===== -->
  <g filter="url(#softShadow)">
    <!-- outer ring (3D effect with two ellipses) -->
    <circle cx="250" cy="240" r="100" fill="url(#outerRing)" filter="url(#ringGlow)"/>
    <circle cx="250" cy="240" r="94" fill="#ffffff" opacity="0.05"/>
    <!-- outer ring highlight (3D top arc) -->
    <path d="M 160,200 A 95,95 0 0 1 340,200" fill="none" stroke="#e9d5ff" stroke-width="3" opacity="0.15"/>

    <!-- inner face -->
    <circle cx="250" cy="240" r="86" fill="url(#innerFace)"/>

    <!-- radial gradation lines -->
    <g stroke="#818cf8" stroke-width="0.8" opacity="0.15">
      <line x1="250" y1="154" x2="250" y2="180"/>
      <line x1="336" y1="240" x2="310" y2="240"/>
      <line x1="250" y1="326" x2="250" y2="300"/>
      <line x1="164" y1="240" x2="190" y2="240"/>
      <line x1="189" y1="179" x2="206" y2="196"/>
      <line x1="311" y1="179" x2="294" y2="196"/>
      <line x1="311" y1="301" x2="294" y2="284"/>
      <line x1="189" y1="301" x2="206" y2="284"/>
    </g>

    <!-- cardinal markers (top = primary / north) -->
    <!-- Top marker (primary direction, larger) -->
    <polygon points="250,162 242,176 258,176" fill="#c084fc" filter="url(#softGlow)"/>
    <polygon points="250,165 244,174 256,174" fill="#e9d5ff" opacity="0.4"/>

    <!-- Bottom marker -->
    <polygon points="250,318 244,304 256,304" fill="#6366f1" opacity="0.5"/>

    <!-- Right marker -->
    <polygon points="328,240 314,232 314,248" fill="#818cf8" opacity="0.5"/>

    <!-- Left marker -->
    <polygon points="172,240 186,232 186,248" fill="#818cf8" opacity="0.5"/>

    <!-- Diagonal markers (smaller dots) -->
    <circle cx="206" cy="196" r="2.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="294" cy="196" r="2.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="206" cy="284" r="2.5" fill="#6366f1" opacity="0.4"/>
    <circle cx="294" cy="284" r="2.5" fill="#6366f1" opacity="0.4"/>

    <!-- degree tick marks -->
    <g stroke="#4c1d95" stroke-width="1.5" opacity="0.2">
      <!-- every 30 degrees -->
      <line x1="250" y1="155" x2="250" y2="165"/>
      <line x1="335" y1="240" x2="325" y2="240"/>
      <line x1="250" y1="325" x2="250" y2="315"/>
      <line x1="165" y1="240" x2="175" y2="240"/>
      <line x1="190" y1="180" x2="197" y2="187"/>
      <line x1="310" y1="180" x2="303" y2="187"/>
      <line x1="310" y1="300" x2="303" y2="293"/>
      <line x1="190" y1="300" x2="197" y2="293"/>
    </g>
    <g stroke="#4c1d95" stroke-width="1" opacity="0.12">
      <line x1="250" y1="155" x2="250" y2="161"/>
      <line x1="331" y1="240" x2="322" y2="240"/>
      <line x1="250" y1="325" x2="250" y2="319"/>
      <line x1="169" y1="240" x2="178" y2="240"/>
    </g>

    <!-- inner ring accent -->
    <circle cx="250" cy="240" r="72" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.2"/>

    <!-- ===== COMPASS NEEDLE ===== -->
    <g transform="translate(250, 240) rotate(-35)">
      <!-- needle glow aura -->
      <ellipse cx="0" cy="0" rx="4" ry="50" fill="#c084fc" opacity="0.15" filter="url(#glow)"/>

      <!-- needle top half (pointing up/north, light) -->
      <polygon points="0,-60 -7,0 0,-4 7,0" fill="url(#needleLight)" filter="url(#needleGlow)"/>
      <!-- needle top highlight -->
      <polygon points="0,-60 -3,0 0,-4" fill="#ffffff" opacity="0.2"/>

      <!-- needle bottom half (dark) -->
      <polygon points="0,60 -5,0 0,4 5,0" fill="url(#needleDark)"/>

      <!-- center dot -->
      <circle cx="0" cy="0" r="7" fill="#1e1b4b"/>
      <circle cx="0" cy="0" r="5" fill="#c084fc" filter="url(#needleGlow)"/>
      <circle cx="0" cy="0" r="2.5" fill="#e9d5ff"/>
    </g>

    <!-- glass reflection overlay -->
    <ellipse cx="220" cy="205" rx="50" ry="40" fill="#ffffff" opacity="0.03"/>
  </g>

  <!-- data particles near compass -->
  <g filter="url(#pGlow)">
    <circle cx="170" cy="160" r="2" fill="#c084fc" opacity="0.55"/>
    <circle cx="330" cy="175" r="2.5" fill="#a855f7" opacity="0.5"/>
    <circle cx="345" cy="300" r="2" fill="#8b5cf6" opacity="0.45"/>
    <circle cx="155" cy="310" r="1.5" fill="#c084fc" opacity="0.5"/>
    <circle cx="200" cy="140" r="1.5" fill="#a78bfa" opacity="0.4"/>
    <circle cx="310" cy="335" r="2" fill="#818cf8" opacity="0.4"/>
  </g>
</svg>