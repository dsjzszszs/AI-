<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="scriptCover" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="scriptPage" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fafaff"/><stop offset="100%" stop-color="#f0f0ff"/>
    </linearGradient>
    <linearGradient id="storyboardBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="storyCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#f0f0ff"/>
    </linearGradient>
    <linearGradient id="pencilBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="baseGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.18"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <ellipse cx="250" cy="435" rx="190" ry="18" fill="url(#baseGlow)"/>

  <!-- particles -->
  <g filter="url(#pGlow)">
    <circle cx="55" cy="100" r="2.5" fill="#a855f7" opacity="0.4"/>
    <circle cx="445" cy="100" r="2" fill="#818cf8" opacity="0.45"/>
    <circle cx="460" cy="350" r="3" fill="#7c3aed" opacity="0.3"/>
    <circle cx="40" cy="330" r="2" fill="#6366f1" opacity="0.4"/>
    <circle cx="390" cy="60" r="2" fill="#c084fc" opacity="0.5"/>
    <circle cx="90" cy="420" r="1.5" fill="#818cf8" opacity="0.35"/>
    <circle cx="430" cy="240" r="1.5" fill="#a78bfa" opacity="0.4"/>
  </g>

  <!-- ===== SCRIPT BOOK (left) ===== -->
  <g filter="url(#softShadow)" transform="translate(95, 185)">
    <!-- book shadow -->
    <polygon points="5,5 145,5 155,110 15,110" fill="#4c1d95" opacity="0.15"/>
    <!-- back page -->
    <polygon points="2,2 142,2 152,107 12,107" fill="url(#scriptCover)" opacity="0.5"/>
    <!-- front page -->
    <polygon points="0,0 140,0 150,105 10,105" fill="url(#scriptPage)"/>
    <!-- spine -->
    <line x1="0" y1="0" x2="10" y2="105" stroke="url(#scriptCover)" stroke-width="4"/>
    <!-- text lines on page -->
    <g opacity="0.3">
      <rect x="20" y="25" width="100" height="4" rx="2" fill="#6366f1"/>
      <rect x="20" y="35" width="90" height="4" rx="2" fill="#818cf8"/>
      <rect x="20" y="45" width="105" height="4" rx="2" fill="#6366f1"/>
      <rect x="20" y="55" width="80" height="4" rx="2" fill="#818cf8"/>
      <rect x="20" y="65" width="95" height="4" rx="2" fill="#6366f1"/>
      <rect x="20" y="75" width="85" height="4" rx="2" fill="#818cf8"/>
      <rect x="20" y="85" width="70" height="4" rx="2" fill="#6366f1"/>
    </g>
  </g>

  <!-- ===== STORYBOARD (right) ===== -->
  <g filter="url(#softShadow)" transform="translate(290, 175)">
    <!-- board frame -->
    <rect x="0" y="0" width="135" height="155" rx="8" fill="url(#storyboardBody)"/>
    <!-- inner area -->
    <rect x="8" y="8" width="119" height="139" rx="4" fill="#fafaff"/>

    <!-- frame 1 (top-left) -->
    <rect x="16" y="16" width="52" height="40" rx="4" fill="url(#storyCell)" stroke="#6366f1" stroke-width="1.5"/>
    <g opacity="0.5">
      <circle cx="38" cy="34" r="6" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <rect x="32" y="42" width="12" height="8" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <!-- spiky hair -->
      <path d="M 34,28 L 36,22 L 38,28 L 40,21 L 42,28" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </g>

    <!-- frame 2 (top-right) -->
    <rect x="74" y="16" width="52" height="40" rx="4" fill="url(#storyCell)" stroke="#6366f1" stroke-width="1.5"/>
    <g opacity="0.4">
      <circle cx="100" cy="34" r="7" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <path d="M 96,28 L 99,24 L 102,28" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    </g>

    <!-- frame 3 (bottom-left) -->
    <rect x="16" y="64" width="52" height="40" rx="4" fill="url(#storyCell)" stroke="#6366f1" stroke-width="1.5"/>
    <g opacity="0.35">
      <rect x="30" y="74" width="24" height="18" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
      <polygon points="40,78 40,86 48,82" fill="none" stroke="#7c3aed" stroke-width="1"/>
    </g>

    <!-- frame 4 (bottom-right) -->
    <rect x="74" y="64" width="52" height="40" rx="4" fill="url(#storyCell)" stroke="#6366f1" stroke-width="1.5"/>
    <g opacity="0.3">
      <circle cx="100" cy="82" r="8" fill="#6366f1" opacity="0.1"/>
      <circle cx="100" cy="82" r="4" fill="#7c3aed" opacity="0.2"/>
    </g>

    <!-- frame labels (small dots) -->
    <circle cx="42" cy="62" r="2" fill="#6366f1"/>
    <circle cx="100" cy="62" r="2" fill="#6366f1"/>
    <circle cx="42" cy="110" r="2" fill="#6366f1"/>
    <circle cx="100" cy="110" r="2" fill="#6366f1"/>

    <!-- connecting lines on board -->
    <g stroke="#818cf8" stroke-width="0.8" opacity="0.3">
      <line x1="68" y1="36" x2="74" y2="36"/>
      <line x1="42" y1="56" x2="42" y2="64"/>
      <line x1="100" y1="56" x2="100" y2="64"/>
      <line x1="68" y1="84" x2="74" y2="84"/>
    </g>
  </g>

  <!-- ===== FLOATING PENCIL ===== -->
  <g filter="url(#softShadow)" transform="translate(240, 130) rotate(-40)">
    <!-- eraser -->
    <rect x="-3" y="-32" width="14" height="9" rx="2" fill="#f472b6"/>
    <!-- ferrule -->
    <rect x="-3" y="-23" width="14" height="6" fill="#c0c0c0"/>
    <!-- body -->
    <rect x="-3" y="-17" width="14" height="42" fill="url(#pencilBody)"/>
    <!-- wood tip -->
    <polygon points="-3,25 11,25 7,38 1,38" fill="#fde68a"/>
    <!-- graphite -->
    <polygon points="1,38 7,38 4,43" fill="#4b5563"/>
    <!-- highlight -->
    <rect x="1" y="-15" width="2.5" height="38" fill="#ffffff" opacity="0.3"/>
  </g>

  <!-- pencil tip glow -->
  <circle cx="265" cy="170" r="6" fill="#c084fc" opacity="0.25" filter="url(#glow)"/>
</svg>