<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewportMeta">
  <title>思维导图 - 金牌AI视频剧</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1a1a2e;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

    /* ===== Keyframes ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== Top Bar ===== */
    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar .btn-back {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(102,126,234,0.08); color: #667eea;
      font-size: 20px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; border: none; flex-shrink: 0;
    }
    .top-bar .btn-back:hover { background: rgba(102,126,234,0.16); }
    .top-bar .btn-back:active { transform: scale(0.9); }
    .top-bar .page-title {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== Image Viewer ===== */
    .img-viewer-page {
      max-width: 1000px; margin: 0 auto; padding: 20px 16px 80px;
      animation: fadeInUp 0.4s ease;
    }
    .img-viewer-page .iv-header {
      text-align: center; margin-bottom: 24px;
    }
    .img-viewer-page .iv-header h2 {
      font-size: clamp(20px, 3.5vw, 28px); font-weight: 800; margin-bottom: 4px;
    }
    .img-viewer-page .iv-header h2 span {
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .img-viewer-page .iv-header .iv-count {
      font-size: 13px; color: #999;
    }
    .img-viewer-page img {
      display: block; width: 100%; margin-bottom: 8px;
      border-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      cursor: zoom-in; transition: transform 0.2s;
    }
    .img-viewer-page img:hover {
      transform: scale(1.01);
    }

    /* ===== Fullscreen Overlay ===== */
    .fs-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.95);
      animation: fadeIn 0.2s ease;
      display: grid; place-items: center;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pinch-zoom;
    }
    .fs-overlay img {
      display: block;
      max-width: 100%;
      max-height: 100vh;
      width: auto; height: auto;
      box-shadow: none;
      border-radius: 0;
    }
    .fs-overlay .fs-close {
      position: fixed; top: 12px; right: 16px;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.2); border: none;
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10000; transition: background 0.2s;
    }
    .fs-overlay .fs-close:hover { background: rgba(255,255,255,0.35); }
    .fs-overlay .fs-hint {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 12px;
      z-index: 10000; pointer-events: none;
      animation: fadeIn 0.5s ease 0.3s both;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .img-viewer-page { padding: 10px 12px 60px; }
      .top-bar { padding: 10px 16px; }
      .top-bar .page-title { font-size: 15px; }
    }

    @media (max-width: 480px) {
      .img-viewer-page { padding: 8px 8px 60px; }
      .img-viewer-page img { border-radius: 3px; margin-bottom: 4px; }
      .fs-overlay .fs-close { top: 10px; right: 12px; width: 34px; height: 34px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <button class="btn-back" onclick="history.back()">‹</button>
    <span class="page-title">🧠 思维导图</span>
  </div>

  <!-- ===== MINDMAP VIEWER ===== -->
  <div class="img-viewer-page">
    <div class="iv-header">
      <h2 id="mmHeading">第<span>一</span>周 · 思维导图</h2>
      <div class="iv-count" id="mmCount"></div>
    </div>
    <div class="iv-pages" id="mmPages"></div>
  </div>

<script>
  // ===== 课程数据 =====
  var WEEKS = [
    { num:'一' }, { num:'二' }, { num:'三' }, { num:'四' },
    { num:'五' }, { num:'六' }, { num:'七' }, { num:'八' }
  ];

  var WEEK_DATA = {
    1: {
      mindmap: [
        { name:'5月11日思维导图' },
        { name:'5月12日思维导图' },
        { name:'5月14日思维导图' },
        { name:'整体课程思维导图' },
        { name:'树帆教育水印' }
      ],
      mmBase: '5月工作/八周课——第一周/思维导图/images'
    },
    2: {
      mindmap: [
        { name:'5月18号和19号思维导图' },
        { name:'用AI制作视频剧：图生视频与剪映实战课件-思维导图' },
        { name:'视频段的跑动和视频编辑初步介绍' }
      ],
      mmBase: '5月工作/八周课——第二周/mm_images'
    }
  };

  // ===== 读取 URL 参数 =====
  function getParam(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  // ===== 全屏查看 =====
  function openFullscreen(src) {
    history.pushState({ fsOpen: true }, '');
    var vp = document.getElementById('viewportMeta');
    if (vp) vp.content = 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes';
    var ov = document.createElement('div');
    ov.className = 'fs-overlay';
    ov.innerHTML = '<button class="fs-close">✕</button><img src="' + src + '"><div class="fs-hint">双指缩放 · 单击关闭</div>';
    ov.querySelector('.fs-close').addEventListener('click', closeFsOverlay);
    ov.addEventListener('click', function(e) { if (e.target === ov) closeFsOverlay(); });
    ov.querySelector('img').addEventListener('click', function() {
      var h = ov.querySelector('.fs-hint'); if (h) h.style.display = 'none';
    });
    document.body.appendChild(ov);
    document.body.style.overflow = 'hidden';
  }

  function closeFsOverlay() {
    var ov = document.querySelector('.fs-overlay');
    if (ov) ov.remove();
    document.body.style.overflow = '';
    var vp = document.getElementById('viewportMeta');
    if (vp) vp.content = 'width=device-width, initial-scale=1.0';
    if (history.state && history.state.fsOpen) history.back();
  }

  window.addEventListener('popstate', function() {
    var ov = document.querySelector('.fs-overlay');
    if (ov) { ov.remove(); document.body.style.overflow = ''; }
  });

  // ===== 初始化 =====
  (function() {
    var w = parseInt(getParam('w')) || 1;
    var data = WEEK_DATA[w];
    var wk = WEEKS[w - 1];

    if (!data || !data.mindmap) {
      document.getElementById('mmPages').innerHTML = '<p style="text-align:center;color:#999;padding:60px;">思维导图正在制作中，敬请期待～</p>';
      document.getElementById('mmCount').textContent = '';
      document.getElementById('mmHeading').innerHTML = '第<span>' + wk.num + '</span>周 · 思维导图';
      return;
    }

    document.getElementById('mmHeading').innerHTML = '第<span>' + wk.num + '</span>周 · 思维导图';
    document.getElementById('mmCount').textContent = '共 ' + data.mindmap.length + ' 份';

    var imgs = '';
    for (var i = 0; i < data.mindmap.length; i++) {
      var src = data.mmBase + '/page_' + String(i + 1).padStart(3, '0') + '.jpg';
      imgs += '<img src="' + src + '" alt="' + data.mindmap[i].name + '" loading="lazy" onclick="openFullscreen(this.src)">';
    }
    document.getElementById('mmPages').innerHTML = imgs;
  })();
</script>
</body>
</html>
