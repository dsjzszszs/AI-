<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程周详情 - 金牌AI视频剧</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #1a1a2e;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }

    /* ===== Keyframes ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== Top Bar ===== */
    .top-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky; top: 0; z-index: 100;
    }
    .top-bar .btn-back {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(102,126,234,0.08); color: #667eea;
      font-size: 20px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; border: none; flex-shrink: 0;
    }
    .top-bar .btn-back:hover { background: rgba(102,126,234,0.16); }
    .top-bar .btn-back:active { transform: scale(0.9); }
    .top-bar .page-title {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== Week Detail ===== */
    .week-detail {
      max-width: 700px; margin: 0 auto; padding: 40px 28px 80px;
      animation: fadeInUp 0.4s ease;
    }
    .week-detail .wd-title {
      font-size: clamp(22px, 4vw, 34px); font-weight: 800; margin-bottom: 4px;
    }
    .week-detail .wd-title span {
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .week-detail .wd-sub { color: #888; font-size: 14px; margin-bottom: 36px; }

    /* ===== Category Grid ===== */
    .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .category-card {
      padding: 40px 20px; border-radius: 18px; background: #fff;
      border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      text-align: center; cursor: pointer; user-select: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: block;
    }
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(102,126,234,0.1);
      border-color: rgba(102,126,234,0.15);
    }
    .category-card:active { transform: scale(0.97); }
    .category-card .cat-icon { font-size: 44px; margin-bottom: 12px; display: block; }
    .category-card .cat-name { font-size: 18px; font-weight: 700; color: #1a1a2e; }

    /* ===== Placeholder (Coming Soon) ===== */
    .placeholder-content {
      max-width: 520px; margin: 0 auto; padding: 80px 28px; text-align: center;
      animation: fadeInUp 0.4s ease;
    }
    .placeholder-content .ph-icon { font-size: 72px; margin-bottom: 20px; display: block; }
    .placeholder-content h2 { font-size: clamp(20px, 4vw, 28px); font-weight: 800; margin-bottom: 10px; }
    .placeholder-content h2 span {
      background: linear-gradient(135deg, #667eea, #f093fb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .placeholder-content p { color: #888; font-size: 15px; line-height: 1.8; }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .category-grid { gap: 12px; }
      .category-card { padding: 32px 16px; }
      .category-card .cat-icon { font-size: 36px; }
      .category-card .cat-name { font-size: 16px; }
      .week-detail { padding: 24px 20px 60px; }
      .top-bar { padding: 10px 16px; }
      .top-bar .page-title { font-size: 15px; }
    }

    @media (max-width: 480px) {
      .category-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .category-card { padding: 28px 16px; }
      .placeholder-content .ph-icon { font-size: 56px; }
    }
  </style>
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <button class="btn-back" onclick="history.back()">‹</button>
    <span class="page-title" id="pageTitle">课程详情</span>
  </div>

  <!-- ===== WEEK DETAIL (has data) ===== -->
  <div id="detailView" style="display:none;">
    <div class="week-detail">
      <div class="wd-title" id="wdTitle">第<span></span>周</div>
      <p class="wd-sub" id="wdSub"></p>
      <div class="category-grid" id="categoryGrid"></div>
    </div>
  </div>

  <!-- ===== COMING SOON (no data) ===== -->
  <div id="comingSoonView" style="display:none;">
    <div class="placeholder-content">
      <span class="ph-icon">🚧</span>
      <h2><span id="csHeading">内容施工中</span></h2>
      <p>课程内容正在上传，请耐心等待哦～<br>我们正在加紧制作，很快就会和你见面 🎉</p>
    </div>
  </div>

<script>
  // ===== 课程数据 =====
  var WEEKS = [
    { num:'一', topic:'AI视频基础概念与前期准备', outcome:'了解AI视频全流程，搭建创作基础', icon:'🎬' },
    { num:'二', topic:'剧本创作与分镜设计', outcome:'学会用AI辅助撰写剧本、设计分镜', icon:'📝' },
    { num:'三', topic:'AI绘画与视觉生成', outcome:'掌握AI绘画工具，生成惊艳视觉素材', icon:'🎨' },
    { num:'四', topic:'动态视频生成技术', outcome:'将静态画面转化为流畅动态视频', icon:'🎞️' },
    { num:'五', topic:'配音配乐与音效制作', outcome:'AI语音合成+配乐，让视频有声有色', icon:'🎵' },
    { num:'六', topic:'剪辑合成与后期特效', outcome:'AI辅助剪辑，一键添加炫酷特效', icon:'✂️' },
    { num:'七', topic:'综合实战项目（上）', outcome:'从0到1完成一部AI短片制作', icon:'🚀' },
    { num:'八', topic:'综合实战项目（下）', outcome:'作品打磨与发布，打造个人作品集', icon:'🏆' }
  ];

  // 已上线的周数据（后续在此添加新周）
  var WEEK_DATA = {
    1: {
      topic: 'AI视频基础概念与前期准备',
      courseware: [
        { displayName:'AI视频剧的基础概念和前期准备' },
        { displayName:'AI视频制作《清明》古诗动画制作课件' },
        { displayName:'加餐课：AI视频制作背后的底层知识' }
      ],
      cwPages: [17, 22, 19],
      cwBase: '5月工作/八周课——第一周/PPT+PDF/images',
      mindmap: [
        { name:'5月11日思维导图' },
        { name:'5月12日思维导图' },
        { name:'5月14日思维导图' },
        { name:'整体课程思维导图' },
        { name:'树帆教育水印' }
      ],
      mmBase: '5月工作/八周课——第一周/思维导图/images',
      videos: [
        { name:'正课《AI视频剧的基础概念和前期准备》', src:'5月工作/八周课——第一周/正课《AI视频剧的基础概念和前期准备》.mp4' },
        { name:'正课《古诗词AI视频短片制作》', src:'5月工作/八周课——第一周/正课《古诗词AI视频短片制作》.mp4' },
        { name:'加餐课《AI基础知识解析》', src:'5月工作/八周课——第一周/正课《加餐课-AI基础知识解析》.mp4' },
        { name:'正课《AI视频剧课程作业点评》', src:'5月工作/八周课——第一周/正课《AI视频剧课程作业点评》.mp4' }
      ]
    },
    2: {
      topic: 'AI动画剧的前期设计',
      courseware: [
        { displayName:'AI制作分镜头画面和编辑图片技巧' },
        { displayName:'用AI制作视频剧：图生视频与剪映实战课件' },
        { displayName:'视频段的跑动和视频编辑初步介绍' }
      ],
      cwPages: [17, 15, 19],
      cwBase: '5月工作/八周课——第二周/pdf_images',
      mindmap: [
        { name:'5月18号和19号思维导图' },
        { name:'用AI制作视频剧：图生视频与剪映实战课件-思维导图' },
        { name:'视频段的跑动和视频编辑初步介绍' }
      ],
      mmBase: '5月工作/八周课——第二周/mm_images',
      videos: [
        { name:'正课《AI动画剧的前期设计》', src:'5月工作/八周课——第二周/正课《AI动画剧的前期设计》.mp4' },
        { name:'正课《加餐课-AI视频剧常见知识解析》', src:'5月工作/八周课——第二周/正课《加餐课-AI视频剧常见知识解析》.mp4' },
        { name:'正课《如何合理的使用AI算力》', src:'5月工作/八周课——第二周/正课《如何合理的使用AI算力》.mp4' },
        { name:'正课《如何用视频讲故事》', src:'5月工作/八周课——第二周/正课《如何用视频讲故事》.mp4' }
      ]
    }
  };

  // ===== 读取 URL 参数 =====
  function getParam(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  // ===== 初始化 =====
  (function() {
    var w = parseInt(getParam('w')) || 1;
    var data = WEEK_DATA[w];
    var wk = WEEKS[w - 1];

    document.getElementById('pageTitle').textContent = '第' + wk.num + '周';

    if (data) {
      // 有数据 — 显示详情
      document.getElementById('detailView').style.display = 'block';
      document.getElementById('wdTitle').querySelector('span').textContent = wk.num;
      document.getElementById('wdSub').textContent = data.topic;

      // 渲染分类卡片
      var cats = [
        { icon:'📖', name:'课件', href:'courseware.html?w=' + w },
        { icon:'🧠', name:'思维导图', href:'mindmap.html?w=' + w },
        { icon:'🎬', name:'视频课程', href:'video.html?w=' + w }
      ];
      document.getElementById('categoryGrid').innerHTML = cats.map(function(cat) {
        return '<a class="category-card" href="' + cat.href + '"><span class="cat-icon">' + cat.icon + '</span><div class="cat-name">' + cat.name + '</div></a>';
      }).join('');
    } else {
      // 无数据 — 显示筹备中
      document.getElementById('comingSoonView').style.display = 'block';
      document.getElementById('csHeading').textContent = '第' + wk.num + '周 · 筹备中';
    }
  })();
</script>
</body>
</html>
