<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播回放 - 金牌AI视频剧</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 35%,#fce4ec 70%,#e0f2fe 100%);background-attachment:fixed;color:#1a1a2e;min-height:100vh;overflow-x:hidden;line-height:1.6}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.2);border-radius:3px}@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.top-bar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.08);position:sticky;top:0;z-index:100}.top-bar .btn-back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,0.06);color:#3b82f6;font-size:20px;font-weight:600;cursor:pointer;transition:all 0.25s;border:none;flex-shrink:0}.top-bar .btn-back:hover{background:rgba(59,130,246,0.12)}.top-bar .page-title{font-size:16px;font-weight:700;background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.screen-container{max-width:750px;margin:36px auto;padding:0 28px;animation:fadeInUp 0.6s ease;position:relative}
.screen-frame{position:relative;border-radius:10px;z-index:1;background:linear-gradient(180deg,#e8ecf1 0%,#e2e6ec 100%);border:1.5px solid #b0b8c4;box-shadow:0 0 0 3px #c8d0d8,0 4px 18px rgba(0,0,0,0.12);padding:28px 28px 38px;overflow:hidden}
.screen-surface{position:relative;z-index:2;background:rgba(255,255,255,0.92);border-radius:6px;padding:40px 32px 44px;box-shadow:inset 0 0 40px rgba(59,130,246,0.04)}
.screen-beam{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:55%;height:120px;z-index:0;background:linear-gradient(to bottom,rgba(59,130,246,0.08),transparent);clip-path:polygon(25% 0%,75% 0%,100% 100%,0% 100%);pointer-events:none}
.screen-content{position:relative;z-index:4}
.screen-content .wd-title{font-size:clamp(22px,4vw,34px);font-weight:800;margin-bottom:4px;text-align:center;color:#1e293b}
.screen-content .wd-title span{background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.screen-content .wd-sub{color:#64748b;font-size:14px;margin-bottom:28px;text-align:center}
.replay-video-wrap{position:relative;z-index:4;max-width:680px;margin:0 auto}
.replay-video-wrap video{width:100%;border-radius:12px;background:#000;box-shadow:0 8px 30px rgba(0,0,0,0.15);display:block}
.replay-tip{margin-top:16px;text-align:center;color:#94a3b8;font-size:13px}
@media(max-width:768px){.screen-container{padding:0 16px;margin:24px auto}.screen-frame{padding:16px 14px 24px;border-width:1px;box-shadow:0 0 0 2px #c8d0d8,0 4px 12px rgba(0,0,0,0.08)}.screen-surface{padding:24px 18px 28px}.top-bar{padding:10px 16px}}
@media(max-width:480px){.screen-container{padding:0 8px;margin:12px auto}.screen-frame{padding:12px 8px 18px;border-width:1px;box-shadow:0 0 0 2px #c8d0d8,0 3px 8px rgba(0,0,0,0.06)}.screen-surface{padding:18px 12px 20px}}
</style>
</head>
<body>
<div class="top-bar"><button class="btn-back" onclick="history.back()">&#8249;</button><span class="page-title" id="pageTitle">直播回放</span></div>
<div class="screen-container">
  <div class="screen-frame">
    <div class="screen-beam"></div>
    <div class="screen-surface">
      <div class="screen-content">
        <div class="wd-title" id="rpTitle">第一节</div>
        <p class="wd-sub" id="rpSub"></p>
        <div class="replay-video-wrap">
          <video id="rpVideo" controls preload="metadata" playsinline></video>
        </div>
        <p class="replay-tip">建议在 Wi-Fi 环境下观看</p>
      </div>
    </div>
  </div>
</div>
<script>
var REPLAY_DATA={
1:{weekNum:'一',title:'第一节',sub:'第一周 · 直播回放',video:'https://pub-22a3693e66df453596742a5598f7513c.r2.dev/replays/week1-lesson1.mp4'}
};
function getParam(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]*)'));return m?decodeURIComponent(m[1]):null}
(function(){
var w=parseInt(getParam('w'))||1,d=REPLAY_DATA[w];
if(d){
document.getElementById('pageTitle').textContent='第'+d.weekNum+'周 · 直播回放';
document.getElementById('rpTitle').textContent=d.title;
document.getElementById('rpSub').textContent=d.sub;
document.getElementById('rpVideo').src=d.video;
}else{
document.getElementById('rpTitle').textContent='暂无回放';
document.getElementById('rpSub').textContent='该周直播回放尚未上传';
}
})();
</script>
<script>(function(){var l=localStorage.getItem("sv");fetch("version.txt?t="+Date.now()).then(function(r){return r.text()}).then(function(t){t=t.trim();if(l&&l!==t){localStorage.setItem("sv",t);location.reload(true)}else{localStorage.setItem("sv",t)}}).catch(function(){})})();</script>
</body>
</html>
