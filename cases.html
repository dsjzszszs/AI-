<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:#060d1a;color:#d0e0f0;overflow-x:hidden;line-height:1.6;padding-top:72px}
    a{color:inherit;text-decoration:none}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#060d1a}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.25);border-radius:3px}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .nav-bar{position:fixed;top:0;left:0;right:0;z-index:1000;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(6,13,26,0.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,transparent,#3b82f6,#06b6d4,#38bdf8,transparent) 1}
    .nav-bar.scrolled{box-shadow:0 0 30px rgba(59,130,246,0.15)}
    .nav-brand{font-size:19px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#3b82f6,#06b6d4,#38bdf8);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradientShift 4s ease infinite;white-space:nowrap}
    .nav-links{display:flex;gap:8px;align-items:center}
    .nav-links a{display:inline-block;padding:10px 18px;border-radius:12px;font-size:14px;font-weight:600;color:#6b8aaa;transition:all 0.3s;white-space:nowrap;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:0;height:2px;border-radius:1px;background:linear-gradient(90deg,#3b82f6,#38bdf8);transition:width 0.3s}
    .nav-links a:hover{color:#a0d0f0;background:rgba(59,130,246,0.1);text-shadow:0 0 8px rgba(59,130,246,0.5)}
    .nav-links a:hover::after{width:60%}
    .nav-links a.active{color:#fff;background:rgba(59,130,246,0.15);text-shadow:0 0 12px rgba(59,130,246,0.6)}
    .nav-links a.active::after{width:80%}
    .nav-toggle{display:none;width:40px;height:40px;border-radius:12px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.2);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}
    .nav-toggle span{display:block;width:20px;height:2px;border-radius:2px;background:#3b82f6;box-shadow:0 0 4px rgba(59,130,246,0.5)}
    .page-section{max-width:900px;margin:0 auto;padding:80px 28px;animation:fadeInUp 0.6s ease}
    .page-section h1{font-size:clamp(28px,5vw,42px);font-weight:900;background:linear-gradient(135deg,#3b82f6,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px rgba(59,130,246,0.3));margin-bottom:8px}
    .page-section .subtitle{color:#6b8aaa;font-size:15px;margin-bottom:48px}
    .case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
    .case-card{background:rgba(10,22,40,0.7);border-radius:18px;overflow:hidden;border:1px solid rgba(59,130,246,0.12);transition:all 0.3s}
    .case-card:hover{transform:translateY(-4px);border-color:rgba(59,130,246,0.35);box-shadow:0 0 30px rgba(59,130,246,0.12)}
    .case-card .cc-thumb{height:180px;background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(6,182,212,0.06));display:flex;align-items:center;justify-content:center;font-size:48px;border-bottom:1px solid rgba(59,130,246,0.1)}
    .case-card .cc-body{padding:24px}
    .case-card .cc-body h3{font-size:17px;font-weight:700;margin-bottom:6px;color:#c0d8f0}
    .case-card .cc-body .cc-tag{display:inline-block;padding:3px 12px;border-radius:8px;font-size:11px;font-weight:600;color:#7ab8f0;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.15);margin-bottom:10px}
    .case-card .cc-body p{font-size:13px;color:#6b8aaa;line-height:1.7}
    @media(max-width:768px){.nav-links{display:none}.nav-links.open{display:flex;flex-direction:column;position:absolute;top:72px;left:0;right:0;background:rgba(6,13,26,0.96);backdrop-filter:blur(24px);padding:16px 24px;gap:4px;border-bottom:1px solid rgba(59,130,246,0.15)}.nav-links.open a{padding:14px 18px;font-size:15px}.nav-toggle{display:flex}.case-grid{grid-template-columns:1fr}}
    @media(max-width:480px){.nav-bar{padding:0 18px}.page-section{padding:48px 20px}}
  </style>
</head>
<body>

      <div class="case-card"><div class="cc-thumb">🎞️</div><div class="cc-body"><h3>学员作品 #2</h3><span class="cc-tag">动画视频</span><p>此处放置学员作品截图或视频链接</p></div></div>
      <div class="case-card"><div class="cc-thumb">📺</div><div class="cc-body"><h3>学员作品 #3</h3><span class="cc-tag">创意广告</span><p>此处放置学员作品截图或视频链接</p></div></div>
      <div class="case-card"><div class="cc-thumb">🌟</div><div class="cc-body"><h3>学员作品 #4</h3><span class="cc-tag">个人Vlog</span><p>此处放置学员作品截图或视频链接</p></div></div>

<script>var t=document.getElementById('navToggle'),l=document.getElementById('navLinks');t.addEventListener('click',function(){l.classList.toggle('open')});l.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){l.classList.remove('open')})});window.addEventListener('scroll',function(){document.getElementById('navBar').classList.toggle('scrolled',window.scrollY>10)});</script>
</body>
</html>
