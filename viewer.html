<!DOCTYPE html>
<html lang="zh-CN" data-v="FIX">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewportMeta"><title>课件预览 - 金牌AI视频剧</title>
<style>*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;background:linear-gradient(135deg,#dbeafe 0%,#ede9fe 35%,#fce4ec 70%,#e0f2fe 100%);background-attachment:fixed;color:#1a1a2e;min-height:100vh;overflow-x:hidden;line-height:1.6}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.2);border-radius:3px}@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.top-bar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:rgba(255,255,255,0.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(59,130,246,0.08);position:sticky;top:0;z-index:100}.top-bar .btn-back{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(59,130,246,0.06);color:#3b82f6;font-size:20px;font-weight:600;cursor:pointer;transition:all 0.25s;border:none;flex-shrink:0}.top-bar .btn-back:hover{background:rgba(59,130,246,0.12)}.top-bar .page-title{font-size:16px;font-weight:700;background:linear-gradient(135deg,#2563eb,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-viewer-page{max-width:1000px;margin:0 auto;padding:20px 16px 80px;animation:fadeInUp 0.4s ease}.img-viewer-page img{display:block;width:100%;margin-bottom:8px;border-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,0.06);cursor:zoom-in;transition:transform 0.2s}.img-viewer-page img:hover{transform:scale(1.01)}
.fs-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.95);animation:fadeIn 0.2s ease;display:grid;place-items:center;overflow:auto;-webkit-overflow-scrolling:touch;touch-action:pinch-zoom}.fs-overlay img{display:block;max-width:100%;max-height:100vh;width:auto;height:auto;box-shadow:none;border-radius:0}.fs-overlay .fs-close{position:fixed;top:12px;right:16px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10000}.fs-overlay .fs-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;z-index:10000;pointer-events:none;animation:fadeIn 0.5s ease 0.3s both}@media(max-width:768px){.img-viewer-page{padding:10px 12px 60px}.top-bar{padding:10px 16px}}@media(max-width:480px){.img-viewer-page{padding:8px 8px 60px}.img-viewer-page img{border-radius:3px;margin-bottom:4px}.fs-overlay .fs-close{top:10px;right:12px;width:34px;height:34px;font-size:18px}}</style></head>
<body>
<div class="top-bar"><button class="btn-back" onclick="history.back()">‹</button><span class="page-title" id="ivTitle">课件预览</span></div>
<div class="img-viewer-page"><div class="iv-pages" id="ivPages"></div></div>
<script>
var WEEK_DATA={1:{courseware:[{displayName:'AI视频剧的基础概念和前期准备'},{displayName:'AI视频制作《清明》古诗动画制作课件'},{displayName:'加餐课：AI视频制作背后的底层知识'}],cwPages:[17,22,19],cwBase:'5月工作/八周课——第一周/PPT+PDF/images'},2:{courseware:[{displayName:'AI制作分镜头画面和编辑图片技巧'},{displayName:'用AI制作视频剧：图生视频与剪映实战课件'},{displayName:'视频段的跑动和视频编辑初步介绍'}],cwPages:[17,15,19],cwBase:'5月工作/八周课——第二周/pdf_images'},3:{courseware:[{displayName:'视频编辑软件的安装和使用'},{displayName:'视频剧的剧本和分镜头构建'},{displayName:'动画叙事的艺术与AI赋能'},{displayName:'AI视频剧制作加餐课'}],cwPages:[20,16,17,17],cwBase:'5月工作/八周课——第三周/pdf_images'},
4:{courseware:[{displayName:'多图生视频技巧'},{displayName:'AI视频剧的分镜头和动画跑动制作'},{displayName:'图生视频技巧详解'},{displayName:'零基础小白玩转agent'}],cwPages:[16,19,18,20],cwBase:'6月工作/八周课—第四周/pdf_images'},
5:{courseware:[{displayName:'第二轮知识点回滚：图生视频技巧详解'},{displayName:'AI漫剧全流程制作'},{displayName:'剪映视频剪辑与后期处理大师课'},{displayName:'复习-AI漫剧全流程制作'}],cwPages:[18, 15, 22, 15],cwBase:'6月工作/八周课—第五周/pdf_images'},
6:{courseware:[{displayName:'AI基础知识复习'},{displayName:'AI的应用与未来发展'},{displayName:'驾驭AI浪潮：构建人机协作的自动化工作流'},{displayName:'动漫影视分镜头基础知识'}],cwPages:[15,21,15,19],cwBase:'6月工作/八周课—第六周/pdf_images'}};
function getParam(n){var m=location.search.match(new RegExp('[?&]'+n+'=([^&]*)'));return m?decodeURIComponent(m[1]):null}
function openFullscreen(s){history.pushState({fsOpen:true},'');var vp=document.getElementById('viewportMeta');if(vp)vp.content='width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes';var ov=document.createElement('div');ov.className='fs-overlay';ov.innerHTML='<button class="fs-close">✕</button><img src="'+s+'"><div class="fs-hint">双指缩放 · 单击关闭</div>';ov.querySelector('.fs-close').addEventListener('click',closeFsOverlay);ov.addEventListener('click',function(e){if(e.target===ov)closeFsOverlay()});document.body.appendChild(ov);document.body.style.overflow='hidden'}
function closeFsOverlay(){var ov=document.querySelector('.fs-overlay');if(ov)ov.remove();document.body.style.overflow='';var vp=document.getElementById('viewportMeta');if(vp)vp.content='width=device-width,initial-scale=1.0';if(history.state&&history.state.fsOpen)history.back()}
window.addEventListener('popstate',function(){var ov=document.querySelector('.fs-overlay');if(ov){ov.remove();document.body.style.overflow=''}});
(function(){var w=parseInt(getParam('w'))||1,i=parseInt(getParam('i'))||0,data=WEEK_DATA[w];if(!data||!data.courseware||!data.courseware[i]){document.getElementById('ivPages').innerHTML='<p style="text-align:center;color:#94a3b8;padding:60px">课件内容暂时无法加载</p>';return}var p=data.courseware[i],total=data.cwPages[i];document.getElementById('ivTitle').textContent=p.displayName;var imgs='';for(var n=1;n<=total;n++){imgs+='<img src="'+data.cwBase+'/pdf'+i+'/page_'+String(n).padStart(3,'0')+'.jpg" alt="第'+n+'页" loading="lazy" onclick="openFullscreen(this.src)">'}document.getElementById('ivPages').innerHTML=imgs})();</script>


<script>(function(){var l=localStorage.getItem("sv");fetch("version.txt?t="+Date.now()).then(function(r){return r.text()}).then(function(t){t=t.trim();if(l&&l!==t){localStorage.setItem("sv",t);location.reload(true)}else{localStorage.setItem("sv",t)}}).catch(function(){})})();</script>
</body></html>
